<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TripPilot Offline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        background: white;
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>TripPilot is offline</h1>
      <p>Your saved trip data is stored on this device. Please reconnect and reopen the app.</p>
    </div>
  </body>
</html>
